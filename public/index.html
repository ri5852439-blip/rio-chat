<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIO</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:15px;
    background:#ece5dd;
}

h2{
    text-align:center;
    background:#ff69b4;
    color:white;
    padding:12px;
    border-radius:10px;
}

#onlineStatus,#typingStatus{
    margin:10px 0;
    font-weight:bold;
}

#messages{
    list-style:none;
    padding:0;
}

#messages li{
    padding:10px;
    margin:8px 0;
    border-radius:12px;
    background:white;
}

form{
    display:flex;
    gap:8px;
}

#messageInput{
    flex:1;
    padding:10px;
}

button{
    padding:10px 15px;
}
</style>
</head>

<body>

<script>
const password = prompt("Enter Password");

if(password !== "omi123"){
    document.write("<h1>Access Denied</h1>");
    throw new Error("Wrong password");
}
</script>

<h2>💖 RIO 💖</h2>

<div id="onlineStatus">🟢 Online: 0</div>
<div id="typingStatus"></div>

<input id="username" placeholder="Your Name">

<br><br>

<ul id="messages"></ul>

<div id="replyBox" style="display:none;background:#ffd6e7;padding:10px;margin:10px 0;border-radius:10px;">
    <strong>Replying to:</strong>
    <span id="replyText"></span>
</div>

<form id="form">
    <input id="messageInput" placeholder="Type a message...">
    <button type="submit">Send</button>
</form>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const form = document.getElementById("form");
const input = document.getElementById("messageInput");
const username = document.getElementById("username");
const messages = document.getElementById("messages");
const onlineStatus = document.getElementById("onlineStatus");
const typingStatus = document.getElementById("typingStatus");

let replyingTo = null;

form.addEventListener("submit", function(e){
    e.preventDefault();

    if(input.value){

        socket.emit("chat message",{
            user: username.value || "Anonymous",
            text: input.value,
            reply: replyingTo
        });

        replyingTo = null;
        document.getElementById("replyBox").style.display = "none";

        input.value = "";
    }
});

input.addEventListener("input", function(){
    socket.emit("typing", username.value || "Someone");
});

socket.on("typing", function(name){
    typingStatus.textContent = name + " is typing...";
});

socket.on("stop typing", function(){
    typingStatus.textContent = "";
});

socket.on("online count", function(count){
    onlineStatus.textContent = "🟢 Online: " + count;
});

socket.on("chat message", function(data){

    const li = document.createElement("li");

    if(data.reply){
        li.innerHTML =
        "<div style='background:#f3d4e4;padding:6px;border-left:4px solid hotpink;border-radius:6px;margin-bottom:6px;font-size:14px'>" +
        data.reply +
        "</div>";
    }

    li.innerHTML +=
        "<strong>" +
        data.user +
        ":</strong> " +
        data.text;

    li.onclick = function(){

        replyingTo = data.user + ": " + data.text;

        document.getElementById("replyText").textContent =
            replyingTo;

        document.getElementById("replyBox").style.display =
            "block";
    };

    messages.appendChild(li);

    window.scrollTo(0, document.body.scrollHeight);
});
</script>

</body>
</html>
